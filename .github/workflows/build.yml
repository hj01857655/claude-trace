name: Build and Commit dist

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install || true

      - name: Build core (tsc + copy loaders)
        run: |
          npx tsc
          cp src/interceptor-loader.js src/token-extractor.js dist/

      - name: Build frontend (optional)
        run: npm run build:frontend || echo "⚠️ Frontend build skipped"
        continue-on-error: true

      - name: Commit dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ -f
          git diff --staged --quiet || git commit -m "chore: auto-build dist [skip ci]"
          git push
